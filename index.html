<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tick-Tack-Toe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="my-img.ico" type="image/x-icon">
</head>
<body>
    <div class="container">
        <div class="head">
            <h2 style="color: beige;">Tic Tac Toe</h2>
        </div>
        
        <div class="main">
            <input class="player-name" type="text", placeholder="Player 'O' name">
            <div class="boxes">
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
            </div>
            <input class="player-name" type="text", placeholder="Player 'X' name">
        </div>
        <div class="footer">
            <div class="butt-control">
                <button id="reset-btn">Reset</button>
                <button id="newGame-btn">New game</button>
            </div>
            <div class="winn-anouncement">
                <p id="msg" class="hide"></p>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
